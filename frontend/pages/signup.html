<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Signup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1f7a6b;
      --primary-dark: #176356;
      --primary-soft: #e8f5f2;
      --page: #f4fbf9;
      --page-alt: #e8f2f0;
      --card: rgba(255, 255, 255, 0.94);
      --text: #17322d;
      --muted: #61817b;
      --border: #d7e6e2;
      --shadow: 0 24px 60px rgba(20, 74, 64, 0.12);
      --success-bg: #edf9f6;
      --success-border: #bee8dd;
      --success-text: #136457;
      --error-bg: #fff1f0;
      --error-border: #f3c6c2;
      --error-text: #b4372d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Poppins", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(31, 122, 107, 0.14), transparent 32%),
        radial-gradient(circle at bottom left, rgba(31, 122, 107, 0.1), transparent 28%),
        linear-gradient(160deg, var(--page) 0%, var(--page-alt) 100%);
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 470px;
      padding: 32px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.9rem, 4vw, 2.3rem);
      line-height: 1.1;
    }

    .intro {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.7;
    }

    form {
      display: grid;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.92rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    input::placeholder {
      color: #8aa39d;
    }

    input:focus {
      border-color: rgba(31, 122, 107, 0.55);
      box-shadow: 0 0 0 5px rgba(31, 122, 107, 0.12);
      transform: translateY(-1px);
    }

    select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    select:focus {
      border-color: rgba(31, 122, 107, 0.55);
      box-shadow: 0 0 0 5px rgba(31, 122, 107, 0.12);
      transform: translateY(-1px);
    }

    button {
      width: 100%;
      margin-top: 4px;
      padding: 14px 18px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(31, 122, 107, 0.24);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 30px rgba(31, 122, 107, 0.3);
      filter: brightness(1.03);
    }

    button:disabled {
      opacity: 0.78;
      cursor: wait;
      transform: none;
      box-shadow: 0 14px 28px rgba(31, 122, 107, 0.16);
    }

    .button-stack {
      display: grid;
      gap: 12px;
      margin-top: 4px;
    }

    .secondary-button {
      margin-top: 0;
      background: transparent;
      color: var(--primary);
      border: 1px solid rgba(31, 122, 107, 0.35);
      box-shadow: none;
    }

    .secondary-button:hover {
      background: rgba(31, 122, 107, 0.05);
      box-shadow: 0 10px 24px rgba(31, 122, 107, 0.12);
    }

    .message {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid transparent;
      font-size: 0.94rem;
      line-height: 1.6;
      display: none;
    }

    .message.success {
      display: block;
      background: var(--success-bg);
      border-color: var(--success-border);
      color: var(--success-text);
    }

    .message.error {
      display: block;
      background: var(--error-bg);
      border-color: var(--error-border);
      color: var(--error-text);
    }

    .auth-link {
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .auth-link a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    .auth-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 24px 20px;
        border-radius: 24px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="eyebrow">Day Scholar Registration</div>
    <h1>Create your account</h1>
    <p class="intro">Join the digital canteen system to buy and use coupons instantly.</p>

    <form id="signupForm">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Enter your full name" required>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Create a secure password" required>
      </div>

      <div class="button-stack">
        <button id="submitBtn" type="submit">Create Account</button>
      </div>
    </form>

    <div id="message" class="message"></div>

    <div class="auth-link">
      Already have an account? <a href="login.html">Login here</a>
    </div>

    <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; font-size: 0.9rem; color: var(--muted);">
      🏢 <strong>Hosteler?</strong> You don't need to sign up. 
      <br>
      <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Login using your Room No</a>
    </div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    const signupForm = document.getElementById("signupForm");
    const submitBtn = document.getElementById("submitBtn");
    const messageBox = document.getElementById("message");

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = `message ${type}`;
    }

    signupForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const formData = new FormData(signupForm);
      const name = formData.get("name").trim();
      const email = formData.get("email").trim();
      const password = formData.get("password");
      
      const payload = { name, email, password };

      submitBtn.disabled = true;
      submitBtn.textContent = "Creating...";
      messageBox.className = "message";
      messageBox.textContent = "";

      try {
        const response = await fetch(`${BASE_URL}/signup`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "Signup failed");
        }

        // Day Scholars are always day-scholars
        const userType = "day-scholar";
        
        saveUserProfile(email, userType);
        setAuthState({
          userId: data.userId,
          role: data.role,
          userType,
          authMode: "standard",
          name: name,
          email: email,
          couponCount: data.couponCount || 0
        });
        
        redirectAfterLogin(data.role, userType);
      } catch (error) {
        showMessage(error.message || "Something went wrong", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Account";
      }
    });

    // Redirect if already logged in
    checkAuthOnPageLoad();
  </script>
</body>

</html>
