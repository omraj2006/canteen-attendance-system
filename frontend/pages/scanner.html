<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1f7a6b;
      --primary-dark: #176356;
      --primary-soft: #e8f5f2;
      --page: #f4fbf9;
      --page-alt: #e9f2ef;
      --card: rgba(255, 255, 255, 0.95);
      --surface: #f8fcfb;
      --text: #17322d;
      --muted: #61817b;
      --border: #d7e6e2;
      --shadow: 0 24px 60px rgba(20, 74, 64, 0.12);
      --success: #136457;
      --success-bg: #edf9f6;
      --success-border: #bee8dd;
      --error: #b4372d;
      --error-bg: #fff1f0;
      --error-border: #f3c6c2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: center;
      font-family: "Poppins", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(31, 122, 107, 0.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(31, 122, 107, 0.1), transparent 26%),
        linear-gradient(160deg, var(--page) 0%, var(--page-alt) 100%);
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 520px;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.9rem, 4vw, 2.25rem);
      line-height: 1.1;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.98rem;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.92rem;
      font-weight: 600;
    }

    select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
      color: var(--text);
      font: inherit;
      outline: none;
    }

    #reader {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .status {
      margin-top: 20px;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: #f8fcfb;
      color: var(--text);
      min-height: 60px;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .status.success {
      color: var(--success);
      background: var(--success-bg);
      border-color: var(--success-border);
    }

    .status.error {
      color: var(--error);
      background: var(--error-bg);
      border-color: var(--error-border);
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 24px 20px;
        border-radius: 24px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="eyebrow">Admin Scanner</div>
    <h1>Scan attendance</h1>
    <p>Choose the active meal type and point the camera at a student QR code to mark attendance instantly.</p>

    <div class="field">
      <label for="mealType">Meal Type</label>
      <select id="mealType">
        <option value="lunch">Lunch</option>
        <option value="dinner">Dinner</option>
      </select>
    </div>

    <div id="reader"></div>
    <div id="status" class="status">Scanner is starting...</div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/scanner.js"></script>
</body>

</html>
