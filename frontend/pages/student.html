<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student QR Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1f7a6b;
      --primary-dark: #176356;
      --primary-soft: #e8f5f2;
      --page: #f4fbf9;
      --page-alt: #e9f2ef;
      --card: rgba(255, 255, 255, 0.94);
      --surface: #f8fcfb;
      --text: #17322d;
      --muted: #61817b;
      --border: #d7e6e2;
      --shadow: 0 24px 60px rgba(20, 74, 64, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Poppins", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(31, 122, 107, 0.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(31, 122, 107, 0.1), transparent 26%),
        linear-gradient(160deg, var(--page) 0%, var(--page-alt) 100%);
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 440px;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 18px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(31, 122, 107, 0.24);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 30px rgba(31, 122, 107, 0.3);
      filter: brightness(1.03);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.9rem, 4vw, 2.2rem);
      line-height: 1.1;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.7;
    }

    .qr-wrapper {
      min-height: 290px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.9) 0%, rgba(248, 252, 251, 0.96) 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .placeholder {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    #qrcode img,
    #qrcode canvas {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      border-radius: 16px;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 24px 20px;
        border-radius: 24px;
      }

      .qr-wrapper {
        min-height: 250px;
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="actions">
      <button id="logoutBtn" type="button">Logout</button>
    </div>

    <div class="eyebrow">Student Access</div>
    <h1>Your QR Code</h1>
    <p>Your attendance QR is generated automatically using your logged-in account. Show it to the scanner when you reach the canteen.</p>

    <section class="qr-wrapper">
      <div id="qrcode">
        <div class="placeholder">Your QR code will appear here.</div>
      </div>
    </section>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/user-dashboard.js"></script>
</body>

</html>
