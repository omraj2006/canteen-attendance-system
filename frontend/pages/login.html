<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1f7a6b;
      --primary-dark: #176356;
      --primary-soft: #e8f5f2;
      --page: #f4fbf9;
      --page-alt: #e9f3f1;
      --card: rgba(255, 255, 255, 0.94);
      --text: #17322d;
      --muted: #61817b;
      --border: #d7e6e2;
      --shadow: 0 24px 60px rgba(20, 74, 64, 0.12);
      --error-bg: #fff1f0;
      --error-border: #f3c6c2;
      --error-text: #b4372d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Poppins", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(31, 122, 107, 0.14), transparent 32%),
        radial-gradient(circle at bottom right, rgba(31, 122, 107, 0.1), transparent 28%),
        linear-gradient(160deg, var(--page) 0%, var(--page-alt) 100%);
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 430px;
      padding: 32px;
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.9rem, 4vw, 2.3rem);
      line-height: 1.1;
    }

    .intro {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.7;
    }

    form {
      display: grid;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.92rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    input::placeholder {
      color: #8aa39d;
    }

    input:focus {
      border-color: rgba(31, 122, 107, 0.55);
      box-shadow: 0 0 0 5px rgba(31, 122, 107, 0.12);
      transform: translateY(-1px);
    }

    button {
      width: 100%;
      margin-top: 4px;
      padding: 14px 18px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(31, 122, 107, 0.24);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 30px rgba(31, 122, 107, 0.3);
      filter: brightness(1.03);
    }

    button:disabled {
      opacity: 0.78;
      cursor: wait;
      transform: none;
      box-shadow: 0 14px 28px rgba(31, 122, 107, 0.16);
    }

    .button-stack {
      display: grid;
      gap: 12px;
      margin-top: 4px;
    }

    .secondary-button {
      margin-top: 0;
      background: transparent;
      color: var(--primary);
      border: 1px solid rgba(31, 122, 107, 0.35);
      box-shadow: none;
    }

    .secondary-button:hover {
      background: rgba(31, 122, 107, 0.05);
      box-shadow: 0 10px 24px rgba(31, 122, 107, 0.12);
    }

    .message {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid transparent;
      font-size: 0.94rem;
      line-height: 1.6;
      display: none;
    }

    .message.error {
      display: block;
      background: var(--error-bg);
      border-color: var(--error-border);
      color: var(--error-text);
    }

    .auth-link {
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .auth-link a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    .auth-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 24px 20px;
        border-radius: 24px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="eyebrow">Digital Canteen Portal</div>
    <h1>Login to continue</h1>
    <p class="intro">Access your attendance records or manage your coupon wallet.</p>

    <!-- Hosteler Instructions Box -->
    <div style="background: var(--primary-soft); border: 1px solid rgba(31, 122, 107, 0.2); border-radius: 18px; padding: 18px; margin-bottom: 25px; display: flex; gap: 14px; align-items: flex-start;">
      <span style="font-size: 1.3rem;">💡</span>
      <div style="font-size: 0.88rem; line-height: 1.5; color: var(--primary-dark);">
        <strong>Hostelers:</strong> Use your <strong>Room Number</strong> as ID and Password. If you have a roommate, use your <strong>Full Name</strong> as ID and your Room Number as Password for the first login.

      </div>
    </div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email or Room Number</label>
        <input id="email" name="email" type="text" placeholder="you@example.com or 101" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" required>
      </div>

      <div class="button-stack">
        <button id="submitBtn" type="submit">Sign In</button>
        <button id="adminLoginBtn" class="secondary-button" type="button">Login as Admin</button>
      </div>
    </form>

    <div id="message" class="message"></div>

    <div class="auth-link">
      New user? <a href="signup.html">Create an account</a>
    </div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/login.js"></script>
  <script>
    // Redirect if already logged in
    checkAuthOnPageLoad();
  </script>
</body>

</html>
