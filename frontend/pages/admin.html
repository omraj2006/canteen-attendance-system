<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Canteen Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1f7a6b;
      --primary-dark: #176356;
      --primary-soft: #e8f5f2;
      --page: #f4fbf9;
      --page-alt: #e9f2ef;
      --card: rgba(255, 255, 255, 0.95);
      --surface: #f8fcfb;
      --text: #17322d;
      --muted: #61817b;
      --border: #d7e6e2;
      --shadow: 0 24px 60px rgba(20, 74, 64, 0.12);
      --danger-bg: #fff1f0;
      --danger-border: #f3c6c2;
      --danger-text: #b4372d;
      --accent: #ff9800;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: "Poppins", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(31, 122, 107, 0.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(31, 122, 107, 0.1), transparent 26%),
        linear-gradient(160deg, var(--page) 0%, var(--page-alt) 100%);
      color: var(--text);
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 32px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.6rem);
      line-height: 1.1;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
    }

    button {
      padding: 12px 20px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(31, 122, 107, 0.2);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(31, 122, 107, 0.25);
    }

    button.secondary {
      background: #fff;
      color: var(--primary);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    button.secondary:hover {
      background: var(--surface);
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }

    .card {
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 24px;
      padding: 24px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Attendance Styles */
    .meta {
      margin-bottom: 16px;
      padding: 12px 16px;
      border-radius: 14px;
      background: var(--surface);
      color: var(--muted);
      font-size: 0.9rem;
      border: 1px solid var(--border);
    }

    .table-container {
      max-height: 400px;
      overflow-y: auto;
    }

    .table {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr;
      gap: 10px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      font-size: 0.9rem;
    }

    .row.header-row {
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 700;
      position: sticky;
      top: 0;
    }

    /* Feedback Styles */
    .feedback-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .feedback-item {
      padding: 14px;
      border-radius: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .feedback-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .feedback-comment {
      font-size: 0.95rem;
      line-height: 1.5;
    }

    /* Upload Styles */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .upload-area:hover {
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    #timetableInput {
      display: none;
    }

    .preview-img {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 16px;
      display: none;
    }

    @media (max-width: 900px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }
      .nav-buttons {
        width: 100%;
      }
      .nav-buttons button {
        flex: 1;
      }
      .row {
        grid-template-columns: 1fr 1fr;
      }
      .row.header-row {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <header class="header">
      <div>
        <div class="eyebrow">Admin Panel</div>
        <h1>Dashboard</h1>
      </div>
      <div class="nav-buttons">
        <button id="openAnalyticsBtn" class="secondary">
          <span>📊</span> Analytics
        </button>
        <button id="openCouponsBtn" class="secondary">
          <span>🎟️</span> Coupons
        </button>
        <button id="openScannerBtn">
          <span>📷</span> Open Scanner
        </button>
        <button id="logoutBtn" class="secondary">Logout</button>
      </div>
    </header>

    <div class="dashboard-grid">
      <div class="main-content">
        <!-- Attendance Section -->
        <section class="card">
          <div class="card-title">
            <span>Today's Attendance</span>
            <div style="display: flex; gap: 8px;">
              <button id="refreshAttendanceBtn" class="secondary" style="padding: 6px 12px; font-size: 0.8rem;">Refresh</button>
              
              <div style="position: relative;">
                <button id="downloadReportBtn" class="secondary" style="padding: 6px 12px; font-size: 0.8rem;">Download ▼</button>
                <div id="downloadMenu" style="display: none; position: absolute; right: 0; top: 100%; background: white; border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); z-index: 100; min-width: 160px; margin-top: 8px; overflow: hidden;">
                  <button id="downloadExcelBtn" style="width: 100%; background: none; color: var(--text); border: none; padding: 12px; text-align: left; font-size: 0.85rem; border-bottom: 1px solid var(--border); border-radius: 0; box-shadow: none;">Export as Excel</button>
                  <button id="downloadPdfBtn" style="width: 100%; background: none; color: var(--text); border: none; padding: 12px; text-align: left; font-size: 0.85rem; border-radius: 0; box-shadow: none;">Export as PDF</button>
                </div>
              </div>
            </div>
          </div>
          <div id="attendanceMeta" class="meta">Loading records...</div>
          <div class="table-container">
            <div id="attendanceList"></div>
          </div>
        </section>

        <!-- Feedback Section -->
        <section class="card">
          <div class="card-title">Student Feedback</div>
          <div id="feedbackList" class="feedback-list">
            <div class="meta">Loading feedback...</div>
          </div>
        </section>
      </div>

      <div class="sidebar">
        <!-- Timetable Upload -->
        <section class="card">
          <div class="card-title">Weekly Timetable</div>
          <p style="font-size: 0.85rem; color: var(--muted); margin-bottom: 16px;">
            Upload the latest menu/timetable to display on student dashboards.
          </p>
          <label for="timetableInput" class="upload-area" id="dropZone">
            <div id="uploadPlaceholder">
              <span style="font-size: 2rem;">📁</span>
              <p>Click or drag image to upload</p>
            </div>
            <img id="timetablePreview" class="preview-img" alt="Timetable Preview">
          </label>
          <input type="file" id="timetableInput" accept="image/*">
          <button id="uploadTimetableBtn" style="width: 100%; margin-top: 16px; justify-content: center; display: none;">
            Save Timetable
          </button>
          <div id="uploadStatus" style="margin-top: 10px; font-size: 0.85rem; text-align: center;"></div>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
</body>

</html>
