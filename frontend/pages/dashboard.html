<!DOCTYPE html>
<html lang="en">


<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1f7a6b;
      --primary-dark: #176356;
      --primary-soft: #e8f5f2;
      --page: #f4fbf9;
      --page-alt: #e9f2ef;
      --card: rgba(255, 255, 255, 0.95);
      --surface: #f8fcfb;
      --text: #17322d;
      --muted: #61817b;
      --border: #d7e6e2;
      --shadow: 0 24px 60px rgba(20, 74, 64, 0.12);
      --danger-bg: #fff1f0;
      --danger-border: #f3c6c2;
      --danger-text: #b4372d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: "Poppins", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(31, 122, 107, 0.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(31, 122, 107, 0.1), transparent 26%),
        linear-gradient(160deg, var(--page) 0%, var(--page-alt) 100%);
      color: var(--text);
    }

    .container {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 2.6rem);
      line-height: 1.08;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .actions {
      position: relative;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      padding: 13px 18px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(31, 122, 107, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 30px rgba(31, 122, 107, 0.28);
      filter: brightness(1.03);
    }

    .export-menu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      display: none;
      min-width: 220px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 20px 44px rgba(20, 74, 64, 0.16);
      backdrop-filter: blur(10px);
    }

    .export-menu.open {
      display: grid;
      gap: 10px;
    }

    .export-option {
      width: 100%;
      text-align: left;
    }

    .card {
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;
      padding: 26px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .meta {
      margin-bottom: 18px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      color: var(--muted);
      font-size: 0.95rem;
    }

    .table {
      display: grid;
      gap: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr;
      gap: 14px;
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(248, 252, 251, 0.96);
      align-items: center;
    }

    .row.header-row {
      background: linear-gradient(180deg, #eff8f5 0%, #e6f3ef 100%);
      color: var(--primary);
      font-weight: 700;
    }

    .cell {
      min-width: 0;
      word-break: break-word;
    }

    .empty,
    .error {
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--surface);
      line-height: 1.6;
    }

    .error {
      color: var(--danger-text);
      background: var(--danger-bg);
      border-color: var(--danger-border);
    }

    @media (max-width: 760px) {
      .header {
        flex-direction: column;
      }

      .actions {
        width: 100%;
        justify-content: stretch;
      }

      .actions button {
        flex: 1 1 180px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      .row.header-row {
        display: none;
      }

      .cell::before {
        content: attr(data-label) ": ";
        font-weight: 700;
        color: var(--primary);
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 20px;
        border-radius: 24px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="header">
      <div>
        <div class="eyebrow">Admin Dashboard</div>
        <h1>Attendance overview</h1>
        <p>Review today’s canteen attendance records and export the report in one click.</p>
      </div>
      <div class="actions">
        <button id="refreshBtn" type="button">Refresh</button>

        <!-- Main Download Button -->
        <div style="position: relative;">
          <button id="downloadBtn">Download Report ▼</button>

          <div id="exportMenu" style="
      display: none;
      position: absolute;
      right: 0;
      background: white;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      padding: 8px;
      margin-top: 5px;
    ">
            <button onclick="window.open(BASE_URL + '/download/excel')">
              Export as Excel
            </button>
            <button onclick="window.open(BASE_URL + '/download/pdf')">
              Export as PDF
            </button>
          </div>
        </div>
      </div>
      </div>
    </section>

    <section class="card">
      <div id="meta" class="meta">Loading records...</div>
      <div id="list"></div>
    </section>
  </main>


  <script src="../js/config.js"></script>
  <script>

    const meta = document.getElementById("meta");
    const list = document.getElementById("list");
    const refreshBtn = document.getElementById("refreshBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const exportMenu = document.getElementById("exportMenu");
    const exportOptions = document.querySelectorAll(".export-option");
    const API_BASE = BASE_URL;

    function renderRows(records) {
      if (!records.length) {
        list.innerHTML = '<div class="empty">No attendance records found for today.</div>';
        return;
      }

      const header = `
        <div class="table">
          <div class="row header-row">
            <div>Name</div>
            <div>Room No</div>
            <div>Meal Type</div>
            <div>Time</div>
          </div>
          ${records.map((record) => `
            <div class="row">
              <div class="cell" data-label="Name">${record.name}</div>
              <div class="cell" data-label="Room No">${record.room_no}</div>
              <div class="cell" data-label="Meal Type">${record.mealType}</div>
              <div class="cell" data-label="Time">${record.time}</div>
            </div>
          `).join("")}
        </div>
      `;

      list.innerHTML = header;
    }

    async function loadAttendance() {
      meta.textContent = "Loading records...";
      list.innerHTML = "";

      try { // Added missing 'try'
        const response = await fetch(`${BASE_URL}/attendance/today`, {
          method: "GET",
          headers: {
            "Content-Type": "application/json",
            "ngrok-skip-browser-warning": "69420"
          }
        });

        // Parse the data from the response
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "Failed to fetch attendance");
        }

        meta.textContent = `Date: ${data.date} | Total records: ${data.count}`;
        renderRows(data.records);

      } catch (error) {
        meta.textContent = "Unable to load attendance";
        list.innerHTML = `<div class="error">${error.message}</div>`;
      }
    }


    exportOptions.forEach((option) => {
      option.addEventListener("click", () => {
        const format = option.dataset.format;
        const exportPath = format === "excel" ? "/download/excel" : "/download/pdf";

        exportMenu.classList.remove("open");
        window.open(`${BASE_URL}${exportPath}`, "_blank");
      });
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".actions")) {
        exportMenu.classList.remove("open");
      }
    });

    loadAttendance();
  </script>
</body>

<script>
  downloadBtn.addEventListener("click", () => {
    exportMenu.style.display =
      exportMenu.style.display === "block" ? "none" : "block";
  });
</script>

</html>
