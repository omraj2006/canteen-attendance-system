<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activate Account - Digital Canteen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1f7a6b;
      --primary-dark: #176356;
      --primary-soft: #e8f5f2;
      --page: #f4fbf9;
      --page-alt: #e9f3f1;
      --card: rgba(255, 255, 255, 0.94);
      --text: #17322d;
      --muted: #61817b;
      --border: #d7e6e2;
      --shadow: 0 24px 60px rgba(20, 74, 64, 0.12);
      --success-bg: #edf9f6;
      --success-border: #bee8dd;
      --success-text: #136457;
      --error-bg: #fff1f0;
      --error-border: #f3c6c2;
      --error-text: #b4372d;
    }

    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px;
      font-family: "Poppins", sans-serif;
      background: radial-gradient(circle at top left, rgba(31, 122, 107, 0.14), transparent 32%),
                  linear-gradient(160deg, var(--page) 0%, var(--page-alt) 100%);
      color: var(--text);
    }

    .card {
      width: 100%; max-width: 430px; padding: 32px; border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 28px; background: var(--card); box-shadow: var(--shadow); backdrop-filter: blur(12px);
    }

    .eyebrow {
      display: inline-flex; align-items: center; padding: 8px 14px; border-radius: 999px;
      background: var(--primary-soft); color: var(--primary); font-size: 0.82rem; font-weight: 600;
      margin-bottom: 18px;
    }

    h1 { margin: 0 0 10px; font-size: clamp(1.8rem, 4vw, 2.2rem); line-height: 1.1; }
    p { margin: 0 0 24px; color: var(--muted); font-size: 0.95rem; line-height: 1.6; }

    .field { display: grid; gap: 8px; margin-bottom: 20px; }
    label { font-size: 0.9rem; font-weight: 600; }
    input {
      width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: 16px;
      background: #fff; font: inherit; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-soft); }

    button {
      width: 100%; padding: 14px; border: 0; border-radius: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff; font: inherit; font-weight: 600; cursor: pointer; box-shadow: var(--shadow);
    }

    .message {
      margin-top: 20px; padding: 14px; border-radius: 16px; font-size: 0.9rem; display: none;
    }
    .message.error { display: block; background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); }
    .message.success { display: block; background: var(--success-bg); border: 1px solid var(--success-border); color: var(--success-text); }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">First-Time Setup</div>
    <h1>Secure your account</h1>
    <p>Welcome, <span id="studentName">Student</span>! Please link your email and set a new password to activate your account.</p>

    <form id="activationForm">
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="field">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="Create a secure password" required>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" required>
      </div>

      <button type="submit" id="submitBtn">Activate Account</button>
    </form>

    <div id="message" class="message"></div>
  </main>

  <script src="../js/config.js"></script>
  <script>
    const userId = localStorage.getItem("tempUserId");
    const userName = localStorage.getItem("tempUserName");
    
    if (!userId) window.location.href = "login.html";
    document.getElementById("studentName").textContent = userName || "Student";

    const form = document.getElementById("activationForm");
    const msgBox = document.getElementById("message");
    const btn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const newPassword = document.getElementById("password").value;
      const confirm = document.getElementById("confirmPassword").value;

      if (newPassword !== confirm) {
        msgBox.textContent = "Passwords do not match";
        msgBox.className = "message error";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Activating...";

      try {
        const res = await fetch(`${BASE_URL}/api/activate-hosteler`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId, email, newPassword })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        msgBox.textContent = "Success! Redirecting to login...";
        msgBox.className = "message success";
        localStorage.removeItem("tempUserId");
        localStorage.removeItem("tempUserName");
        
        setTimeout(() => window.location.href = "login.html", 2000);
      } catch (err) {
        msgBox.textContent = err.message;
        msgBox.className = "message error";
        btn.disabled = false;
        btn.textContent = "Activate Account";
      }
    });
  </script>
</body>
</html>
