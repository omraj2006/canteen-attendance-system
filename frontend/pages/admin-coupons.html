<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coupon Monitoring - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1f7a6b;
      --primary-dark: #176356;
      --primary-soft: #e8f5f2;
      --page: #f4fbf9;
      --page-alt: #e9f2ef;
      --card: rgba(255, 255, 255, 0.95);
      --text: #17322d;
      --muted: #61817b;
      --border: #d7e6e2;
      --shadow: 0 24px 60px rgba(20, 74, 64, 0.12);
      --success: #1f7a6b;
      --danger: #b4372d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(160deg, var(--page) 0%, var(--page-alt) 100%);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .back-btn {
      padding: 10px 16px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--primary);
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card);
      padding: 24px;
      border-radius: 24px;
      box-shadow: var(--shadow);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .stat-value {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--primary);
      margin: 8px 0;
    }

    .stat-label {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 500;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .grid-container {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 24px;
    }

    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.8);
      margin-bottom: 24px;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      padding: 12px 16px;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 700;
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status-active {
      background: #e8f5f2;
      color: var(--success);
    }

    .status-inactive {
      background: #fff1f0;
      color: var(--danger);
    }

    @media (max-width: 900px) {
      .grid-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <div>
        <h1 style="margin: 0;">Coupon Monitoring</h1>
        <p style="color: var(--muted); margin: 4px 0 0;">Track day scholar coupon usage and balances.</p>
      </div>
      <a href="admin.html" class="back-btn">← Back to Dashboard</a>
    </header>

    <!-- Stats Section -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Day Scholars</div>
        <div id="totalScholars" class="stat-value">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Used Today</div>
        <div id="totalUsedToday" class="stat-value" style="color: var(--accent);">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Users (>0)</div>
        <div id="activeUsers" class="stat-value" style="color: var(--success);">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Inactive Users (0)</div>
        <div id="inactiveUsers" class="stat-value" style="color: var(--danger);">0</div>
      </div>
    </div>

    <div class="grid-container">
      <!-- Section 1 & 2: User List -->
      <div class="card">
        <div class="section-title">
          <span>👥</span> Day Scholar User List
          <div style="flex: 1; margin-left: 20px;">
            <input type="text" id="userSearchInput" placeholder="Search by name or email..." style="width: 100%; padding: 10px 16px; border-radius: 12px; border: 1px solid var(--border); font-family: inherit; font-size: 0.85rem; outline: none;">
          </div>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Balance</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="userListBody">
              <!-- Content will be rendered here -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Section 3: Today's Usage -->
      <div class="card">
        <div class="section-title"><span>📊</span> Coupons Used Today</div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>User</th>
                <th>Meal</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody id="usageTodayBody">
              <!-- Content will be rendered here -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/admin-coupons.js"></script>
</body>

</html>
